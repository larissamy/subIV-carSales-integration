name: Auto PR develop to main

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr-to-main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if PR already exists
        id: check-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_COUNT=$(gh pr list \
            --base main \
            --head develop \
            --state open \
            --json number \
            --jq 'length')

          echo "pr_count=$PR_COUNT" >> "$GITHUB_OUTPUT"

      - name: Create PR from develop to main
        if: steps.check-pr.outputs.pr_count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head develop \
            --title "chore: merge develop into main" \
            --body "Auto PR criado após atualização da branch develop."