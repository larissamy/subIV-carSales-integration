name: CI/CD

on:
  pull_request:
    branches: [ "main", "develop" ]
  push:
    branches: [ "main", "develop" ]

permissions:
  contents: read
  pull-requests: write
  packages: write

env:
  IMAGE_NAME: larissay/subiv-carsales-integration

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build, test and coverage
        run: mvn clean verify

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco

  validate-k8s:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Create local Kubernetes cluster
        uses: helm/kind-action@v1.10.0
        with:
          wait: 60s

      - name: Validate Kubernetes manifests
        run: kubectl apply --dry-run=client --validate=false -f k8s/

  docker-build-push:
    runs-on: ubuntu-latest
    needs: validate-k8s
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image and push on main/develop
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-kind:
    runs-on: ubuntu-latest
    needs:
      - build-test
      - validate-k8s
      - docker-build-push
    if: vars.ENABLE_KIND_DEPLOY == 'true' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: kind
          wait: 60s

      - name: Pull Docker image
        run: docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Load Docker image into kind
        run: kind load docker-image ${{ env.IMAGE_NAME }}:${{ github.sha }} --name kind

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      - name: Update deployment image
        run: kubectl set image deployment/vehicle-sales-service vehicle-sales-service=${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/vehicle-sales-service --timeout=180s

  deploy-kubernetes:
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_REAL_K8S_DEPLOY == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to configured Kubernetes cluster
        run: |
          kubectl apply -f k8s/
          kubectl set image deployment/vehicle-sales-service vehicle-sales-service=${{ env.IMAGE_NAME }}:${{ github.sha }}
          kubectl rollout status deployment/vehicle-sales-service --timeout=180s
