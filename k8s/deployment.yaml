apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicle-sales-service
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vehicle-sales-service
  template:
    metadata:
      labels:
        app: vehicle-sales-service
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 1000

      initContainers:
        - name: fix-data-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /data
              chown -R 1000:1000 /data
              chmod -R 775 /data
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: sales-service-data
              mountPath: /data

      containers:
        - name: vehicle-sales-service
          image: larissay/subiv-carsales-integration:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: vehicle-sales-config
            - secretRef:
                name: vehicle-sales-secret
          volumeMounts:
            - name: sales-service-data
              mountPath: /data
          startupProbe:
            tcpSocket:
              port: 8081
            failureThreshold: 30
            periodSeconds: 5

          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12

          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
      volumes:
        - name: sales-service-data
          persistentVolumeClaim:
            claimName: sales-service-pvc
